global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: taskmind-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: taskmind-relay
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["relay:8081"]

  - job_name: taskmind-ai
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ai:8082"]
