# Production Nova profile: every external dependency is supplied by the deployment
# environment/secret manager. Intentionally no local/test fallbacks are provided here.
spring.datasource.url=${TASKMIND_AI_DB_URL}
spring.datasource.username=${TASKMIND_AI_DB_USERNAME}
spring.datasource.password=${TASKMIND_AI_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.schemas=ai
spring.flyway.default-schema=ai
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${TASKMIND_REDIS_HOST}
spring.data.redis.port=${TASKMIND_REDIS_PORT}
spring.data.redis.password=${TASKMIND_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${TASKMIND_REDIS_SSL_ENABLED:true}
taskmind.ai.chat.redis-enabled=true

taskmind.ai.provider.default=${TASKMIND_AI_PROVIDER_DEFAULT}
taskmind.ai.provider.openai.api-key=${OPENAI_API_KEY}
taskmind.ai.provider.openai.model-id=${TASKMIND_AI_OPENAI_MODEL}
taskmind.ai.provider.anthropic.api-key=${ANTHROPIC_API_KEY}
taskmind.ai.provider.anthropic.model-id=${TASKMIND_AI_ANTHROPIC_MODEL}

taskmind.ai.service-token=${TASKMIND_NOVA_SERVICE_TOKEN:${TASKMIND_AI_SERVICE_TOKEN}}
taskmind.core.base-url=${TASKMIND_CORE_BASE_URL}
taskmind.core.service-token=${TASKMIND_CORE_SERVICE_TOKEN}
taskmind.relay.base-url=${TASKMIND_RELAY_BASE_URL}
taskmind.relay.service-token=${TASKMIND_RELAY_SERVICE_TOKEN}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true

logging.level.root=INFO
logging.level.com.taskmind.ai=INFO
logging.level.org.springframework.security=WARN
