spring.application.name=taskmind-backend
server.port=8080

spring.datasource.url=${TASKMIND_DB_URL:jdbc:postgresql://localhost:5432/taskmind}
spring.datasource.username=${TASKMIND_DB_USERNAME:taskmind}
spring.datasource.password=${TASKMIND_DB_PASSWORD:taskmind}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.resourceserver.jwt.issuer-uri=${TASKMIND_AUTH_ISSUER_URI:http://localhost:9000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${TASKMIND_AUTH_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

taskmind.auth.jwt.secret=${TASKMIND_JWT_SECRET:development-only-taskmind-jwt-secret-change-me}
taskmind.auth.jwt.access-ttl=PT1H
taskmind.auth.jwt.refresh-ttl=P30D
taskmind.auth.otp.ttl=PT10M
taskmind.auth.otp.fixed-code=
taskmind.auth.e2e-bypass.enabled=false
