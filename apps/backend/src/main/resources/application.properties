spring.application.name=taskmind-backend
server.port=8080

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.99

spring.datasource.url=${TASKMIND_DB_URL:jdbc:postgresql://localhost:5432/taskmind}
spring.datasource.username=${TASKMIND_DB_USERNAME:taskmind}
spring.datasource.password=${TASKMIND_DB_PASSWORD:taskmind}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.resourceserver.jwt.issuer-uri=${TASKMIND_AUTH_ISSUER_URI:http://localhost:9000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${TASKMIND_AUTH_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

taskmind.auth.jwt.issuer=${TASKMIND_JWT_ISSUER:taskmind-core-local}
taskmind.auth.jwt.audience=${TASKMIND_JWT_AUDIENCE:taskmind-core-api}
taskmind.auth.jwt.secret=${TASKMIND_JWT_SECRET:development-only-taskmind-jwt-secret-change-me}
taskmind.auth.jwt.access-ttl=PT1H
taskmind.auth.jwt.refresh-ttl=P30D
taskmind.auth.otp.ttl=PT10M
taskmind.auth.otp.fixed-code=
taskmind.auth.otp.max-attempts=${TASKMIND_AUTH_OTP_MAX_ATTEMPTS:5}
taskmind.auth.e2e-bypass.enabled=false
taskmind.auth.e2e-bypass.allow-dangerous-local-seed=false
taskmind.cors.allowed-origins=${TASKMIND_CORS_ALLOWED_ORIGINS:}
taskmind.relay.stream-key=${TASKMIND_RELAY_STREAM_KEY:taskmind.events}
taskmind.outbox.enabled=${TASKMIND_OUTBOX_ENABLED:true}
taskmind.outbox.backpressure-stream-length=${TASKMIND_OUTBOX_BACKPRESSURE_STREAM_LENGTH:10000}
taskmind.activity-search.enabled=${TASKMIND_ACTIVITY_SEARCH_ENABLED:false}
taskmind.activity-search.index=${TASKMIND_ACTIVITY_SEARCH_INDEX:activity-events}
taskmind.attachments.adapter=${TASKMIND_ATTACHMENTS_ADAPTER:filesystem}
taskmind.attachments.max-size-bytes=${TASKMIND_ATTACHMENTS_MAX_SIZE_BYTES:10485760}
taskmind.attachments.filesystem-root=${TASKMIND_ATTACHMENTS_FILESYSTEM_ROOT:build/taskmind-attachments}
taskmind.attachments.bucket=${TASKMIND_ATTACHMENTS_BUCKET:taskmind-attachments}
taskmind.attachments.s3-region=${TASKMIND_ATTACHMENTS_S3_REGION:ap-southeast-2}
taskmind.attachments.s3-endpoint=${TASKMIND_ATTACHMENTS_S3_ENDPOINT:}
taskmind.attachments.s3-path-style-access=${TASKMIND_ATTACHMENTS_S3_PATH_STYLE_ACCESS:true}
taskmind.nova.base-url=${TASKMIND_NOVA_BASE_URL:http://localhost:8082}
taskmind.nova.service-token=${TASKMIND_NOVA_SERVICE_TOKEN:${TASKMIND_AI_SERVICE_TOKEN:development-only-nova-service-token}}

taskmind.relay.client.base-url=${TASKMIND_RELAY_BASE_URL:http://localhost:8081}
taskmind.relay.client.service-token=${TASKMIND_RELAY_SERVICE_TOKEN:local-relay-service-token}
taskmind.dashboard.cache.enabled=${TASKMIND_DASHBOARD_CACHE_ENABLED:false}

taskmind.ratelimit.enabled=${TASKMIND_RATELIMIT_ENABLED:true}
taskmind.ratelimit.key-prefix=${TASKMIND_RATELIMIT_KEY_PREFIX:taskmind:ratelimit}
taskmind.ratelimit.trusted-proxies=${TASKMIND_RATELIMIT_TRUSTED_PROXIES:}
taskmind.ratelimit.anonymous.capacity=${TASKMIND_RATELIMIT_ANONYMOUS_CAPACITY:120}
taskmind.ratelimit.anonymous.refill-period=${TASKMIND_RATELIMIT_ANONYMOUS_REFILL_PERIOD:PT1M}
taskmind.ratelimit.authenticated.capacity=${TASKMIND_RATELIMIT_AUTHENTICATED_CAPACITY:600}
taskmind.ratelimit.authenticated.refill-period=${TASKMIND_RATELIMIT_AUTHENTICATED_REFILL_PERIOD:PT1M}
taskmind.ratelimit.auth-flow.capacity=${TASKMIND_RATELIMIT_AUTH_FLOW_CAPACITY:20}
taskmind.ratelimit.auth-flow.refill-period=${TASKMIND_RATELIMIT_AUTH_FLOW_REFILL_PERIOD:PT1M}
taskmind.ratelimit.ai-heavy.capacity=${TASKMIND_RATELIMIT_AI_HEAVY_CAPACITY:30}
taskmind.ratelimit.ai-heavy.refill-period=${TASKMIND_RATELIMIT_AI_HEAVY_REFILL_PERIOD:PT1M}
taskmind.integrations.token-key=${TASKMIND_INTEGRATIONS_TOKEN_KEY:}
taskmind.integrations.token-key-version=${TASKMIND_INTEGRATIONS_TOKEN_KEY_VERSION:local-v1}

taskmind.notifications.enabled=${TASKMIND_NOTIFICATIONS_ENABLED:true}
taskmind.notifications.delivery.retry-backoff=${TASKMIND_NOTIFICATIONS_RETRY_BACKOFF:PT15M}
taskmind.notifications.email.delivery=${TASKMIND_NOTIFICATIONS_EMAIL_DELIVERY:smtp}
taskmind.notifications.email.from=${TASKMIND_NOTIFICATIONS_EMAIL_FROM:notifications@taskmind.local}
taskmind.notifications.email.default-recipient=${TASKMIND_NOTIFICATIONS_EMAIL_DEFAULT_RECIPIENT:}
spring.mail.host=${TASKMIND_SMTP_HOST:localhost}
spring.mail.port=${TASKMIND_SMTP_PORT:25}
spring.mail.username=${TASKMIND_SMTP_USERNAME:}
spring.mail.password=${TASKMIND_SMTP_PASSWORD:}
taskmind.notifications.slack.delivery=${TASKMIND_NOTIFICATIONS_SLACK_DELIVERY:webhook}
taskmind.notifications.slack.bot-token=${TASKMIND_SLACK_BOT_TOKEN:}
