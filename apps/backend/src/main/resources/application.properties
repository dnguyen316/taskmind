spring.application.name=taskmind-backend
server.port=8080

spring.datasource.url=${TASKMIND_DB_URL:jdbc:postgresql://localhost:5432/taskmind}
spring.datasource.username=${TASKMIND_DB_USERNAME:taskmind}
spring.datasource.password=${TASKMIND_DB_PASSWORD:taskmind}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.resourceserver.jwt.issuer-uri=${TASKMIND_AUTH_ISSUER_URI:http://localhost:9000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${TASKMIND_AUTH_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

taskmind.auth.jwt.secret=${TASKMIND_JWT_SECRET:development-only-taskmind-jwt-secret-change-me}
taskmind.auth.jwt.access-ttl=PT1H
taskmind.auth.jwt.refresh-ttl=P30D
taskmind.auth.otp.ttl=PT10M
taskmind.auth.otp.fixed-code=
taskmind.auth.e2e-bypass.enabled=false
taskmind.relay.stream-key=${TASKMIND_RELAY_STREAM_KEY:taskmind.events}
taskmind.outbox.enabled=${TASKMIND_OUTBOX_ENABLED:true}
taskmind.outbox.backpressure-stream-length=${TASKMIND_OUTBOX_BACKPRESSURE_STREAM_LENGTH:10000}
taskmind.activity-search.enabled=${TASKMIND_ACTIVITY_SEARCH_ENABLED:false}
taskmind.activity-search.index=${TASKMIND_ACTIVITY_SEARCH_INDEX:activity-events}
taskmind.attachments.adapter=${TASKMIND_ATTACHMENTS_ADAPTER:filesystem}
taskmind.attachments.max-size-bytes=${TASKMIND_ATTACHMENTS_MAX_SIZE_BYTES:10485760}
taskmind.attachments.filesystem-root=${TASKMIND_ATTACHMENTS_FILESYSTEM_ROOT:build/taskmind-attachments}
taskmind.attachments.bucket=${TASKMIND_ATTACHMENTS_BUCKET:taskmind-attachments}
taskmind.attachments.s3-region=${TASKMIND_ATTACHMENTS_S3_REGION:us-east-1}
taskmind.attachments.s3-endpoint=${TASKMIND_ATTACHMENTS_S3_ENDPOINT:}
taskmind.attachments.s3-path-style-access=${TASKMIND_ATTACHMENTS_S3_PATH_STYLE_ACCESS:true}
