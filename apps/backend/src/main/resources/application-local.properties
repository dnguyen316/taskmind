taskmind.auth.e2e-bypass.enabled=true
taskmind.auth.otp.fixed-code=1
taskmind.cors.allowed-origins=${TASKMIND_CORS_ALLOWED_ORIGINS:http://localhost:5173}
taskmind.ratelimit.enabled=${TASKMIND_RATELIMIT_ENABLED:false}
taskmind.integrations.token-key=${TASKMIND_INTEGRATIONS_TOKEN_KEY:local-development-token-key}
taskmind.integrations.token-key-version=${TASKMIND_INTEGRATIONS_TOKEN_KEY_VERSION:local-v1}
taskmind.notifications.email.delivery=${TASKMIND_NOTIFICATIONS_EMAIL_DELIVERY:fake}
taskmind.notifications.slack.delivery=${TASKMIND_NOTIFICATIONS_SLACK_DELIVERY:fake}
