taskmind.auth.e2e-bypass.enabled=false
taskmind.auth.jwt.issuer=${TASKMIND_JWT_ISSUER}
taskmind.auth.jwt.audience=${TASKMIND_JWT_AUDIENCE}
taskmind.auth.jwt.secret=${TASKMIND_JWT_SECRET}
taskmind.nova.service-token=${TASKMIND_NOVA_SERVICE_TOKEN:${TASKMIND_AI_SERVICE_TOKEN}}
taskmind.relay.client.service-token=${TASKMIND_RELAY_SERVICE_TOKEN}
# Production browser refresh sessions must be sent only over HTTPS.
# SameSite=Lax supports same-site/subdomain SPA login redirects while blocking most cross-site POST CSRF.
taskmind.auth.cookies.secure=true
taskmind.auth.cookies.same-site=Lax
