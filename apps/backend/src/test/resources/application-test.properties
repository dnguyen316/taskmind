spring.datasource.url=jdbc:h2:mem:taskmind;MODE=PostgreSQL;NON_KEYWORDS=KEY,VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.datasource.type=com.taskmind.backend.PostgreSqlModeH2DataSource

taskmind.auth.jwt.secret=test-only-taskmind-jwt-secret-at-least-32-chars
taskmind.auth.e2e-bypass.enabled=true
taskmind.auth.otp.fixed-code=1
