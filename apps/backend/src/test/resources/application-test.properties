spring.datasource.url=jdbc:h2:mem:taskmind;MODE=PostgreSQL;NON_KEYWORDS=KEY,VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.datasource.type=com.taskmind.backend.PostgreSqlModeH2DataSource

taskmind.auth.jwt.secret=test-only-taskmind-jwt-secret-at-least-32-chars
taskmind.auth.e2e-bypass.enabled=true
taskmind.auth.otp.fixed-code=1
taskmind.outbox.enabled=false
taskmind.activity-search.enabled=false
taskmind.attachments.adapter=filesystem
taskmind.attachments.filesystem-root=${java.io.tmpdir}/taskmind-test-attachments
taskmind.attachments.max-size-bytes=1048576
taskmind.integrations.token-key=${TASKMIND_INTEGRATIONS_TOKEN_KEY:test-only-integration-token-key}
taskmind.integrations.token-key-version=${TASKMIND_INTEGRATIONS_TOKEN_KEY_VERSION:test-v1}
taskmind.nova.base-url=http://localhost:8082
taskmind.nova.service-token=test-only-nova-token
taskmind.notifications.email.delivery=fake
taskmind.notifications.slack.delivery=fake
taskmind.relay.client.base-url=http://localhost:8081
taskmind.relay.client.service-token=test-only-relay-token
