          description: User to plan for. Must match the authenticated user unless the caller has ADMIN or MANAGER role.
        availableMinutes: {type: integer, minimum: 1, maximum: 1440}
        includeBlockedTasks:
          type: boolean
          default: false

    PlannedTask:
      type: object
      required: [taskId, title, status, durationMinutes, rationale]
      properties:
        taskId: {type: string, format: uuid}
        title: {type: string}
        status: {type: string}
        durationMinutes: {type: integer}
        rationale: {type: string}

    DailyPlanResponse:
      type: object
      required: [plan, overflow, allocatedMinutes]
      properties:
        plan:
          type: array
          items:
            $ref: '#/components/schemas/PlannedTask'
        overflow:
          type: array
          items:
            $ref: '#/components/schemas/PlannedTask'
        allocatedMinutes: {type: integer}


    PlannerRescheduleProposalsRequest:
      type: object
      required: [taskIds, confirmationTokenRequired]
      properties:
        taskIds:
          type: array
          items: {type: string, format: uuid}
        confirmationTokenRequired: {type: boolean}

    PlannerRescheduleProposal:
      type: object
      required: [taskId, action, explanation, conflictWarnings]
      properties:
        taskId: {type: string, format: uuid}
        action: {type: string}
        explanation: {type: string}
        conflictWarnings:
          type: array
          items: {type: string}

    PlannerRescheduleProposalsResponse:
      type: object
      required: [proposals, confirmationTokenRequired]
      properties:
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/PlannerRescheduleProposal'
        confirmationTokenRequired: {type: boolean}

    AiWeeklyReviewRequest:
      type: object
      description: Empty request; user scope comes from the authenticated principal, not the request body.
      additionalProperties: false
      properties: {}

    AiWeeklyReviewResponse:
      type: object
      required: [userId, summary, slippageInsights, recommendations, nextWeekPriorities]
      properties:
        userId: {type: string, format: uuid}
        summary: {type: string}
        slippageInsights:
          type: array
          items: {type: string}
        recommendations:
          type: array
          items: {type: string}
        nextWeekPriorities:
          type: array
          items: {type: string}

    AiProjectBriefResponse:
      type: object
      required: [projectId, summary, currentFocus, risks, suggestedNextSteps]
      properties:
        projectId: {type: string, format: uuid}
        summary: {type: string}
        currentFocus:
          type: array
          items: {type: string}
        risks:
          type: array
          items: {type: string}
        suggestedNextSteps:
          type: array
          items: {type: string}

    AiDurationEstimateRequest:
      type: object
      required: [title]
      properties:
        title: {type: string, minLength: 1}
        description: {type: string, nullable: true}

    AiDurationEstimateResponse:
      type: object
      required: [durationMinutes, rationale, confidence]
      properties:
        durationMinutes: {type: integer}
        rationale: {type: string}
        confidence: {type: number, format: double}

    AiRationalePhraseRequest:
      type: object
      required: [title]
      properties:
        blockId: {type: string, format: uuid, nullable: true}
        title: {type: string, minLength: 1}
        context: {type: string, nullable: true}

    AiRationalePhraseResponse:
      type: object
      required: [rationale]
      properties:
        blockId: {type: string, format: uuid, nullable: true}
        rationale: {type: string}

    UpdateSchedulingPreferencesRequest:
      type: object
      required: [workdayStart, workdayEnd, blockGranularityMinutes, maxDailyFocusMinutes]
      properties:
        version:
          type: integer
          format: int64
          nullable: true
          description: Optional optimistic-lock version from the latest SchedulingPreferences response.
        workdayStart: {type: string, format: time}
        workdayEnd: {type: string, format: time}
        blockGranularityMinutes: {type: integer, minimum: 15, maximum: 240}
        maxDailyFocusMinutes: {type: integer, minimum: 15, maximum: 1440}

    GenerateScheduleRequest:
      type: object
      properties:
        from: {type: string, format: date-time, nullable: true}
        to: {type: string, format: date-time, nullable: true}

    GenerateScheduleResponse:
      type: object
      description: Scheduler-owned generation result; planning compatibility endpoints do not define this contract.
      required: [blocks, proposals]
      properties:
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledBlock'
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/RescheduleProposal'

    ScheduledBlock:
      type: object
      description: Persisted calendar block owned by the scheduler module.
      required: [id, version, userId, taskId, startsAt, endsAt, status, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        version: {type: integer, format: int64}
        userId: {type: string, format: uuid}
        taskId: {type: string, format: uuid}
        startsAt: {type: string, format: date-time}
        endsAt: {type: string, format: date-time}
        status:
          $ref: '#/components/schemas/ScheduledBlockStatus'
        rationale: {type: string, nullable: true, maxLength: 500}
        completedAt: {type: string, format: date-time, nullable: true}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}

    UpdateScheduledBlockRequest:
      type: object
      properties:
        version:
          type: integer
          format: int64
          nullable: true
          description: Optional optimistic-lock version from the latest ScheduledBlock response.
        startsAt: {type: string, format: date-time, nullable: true}
        endsAt: {type: string, format: date-time, nullable: true}
        rationale: {type: string, nullable: true, maxLength: 500}

    RescheduleProposal:
      type: object
      description: Scheduler-generated proposal for a missed or otherwise conflicting block.
      required: [blockId, taskId, reason]
      properties:
        blockId: {type: string, format: uuid}
        taskId: {type: string, format: uuid}
        reason: {type: string}

    ScheduledBlockStatus:
      type: string
      enum: [SCHEDULED, COMPLETED, MISSED, CANCELLED]

    CreateSpecBreakdownDraftRequest:
      type: object
      required: [projectId, title, rawSpec]
      properties:
        projectId: {type: string, format: uuid}
        templateId: {type: string, format: uuid, nullable: true}
        title: {type: string}
        rawSpec: {type: string}
        richContent: {type: string, nullable: true}
        candidateTree: {type: string, nullable: true}
