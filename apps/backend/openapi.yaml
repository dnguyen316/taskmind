openapi: 3.0.3
info:
  title: TaskMind Backend API
  version: 0.1.0
  description: |
    Initial v1 contract draft for TaskMind backend task and project management endpoints.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: Check Core API health
      operationId: getHealth
      tags: [Health]
      security: []
      responses:
        '200':
          description: Core API is healthy

  /v1/nova/chat:
    post:
      summary: Send an authenticated chat turn to Nova through Core
      operationId: createNovaChatTurn
      tags: [Nova]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NovaChatRequest'
      responses:
        '200':
          description: Provider-neutral Nova chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NovaChatResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/NovaFacadeError'

  /v1/nova/capabilities:
    get:
      summary: List enabled Nova capabilities through Core
      operationId: listNovaCapabilities
      tags: [Nova]
      responses:
        '200':
          description: Enabled provider-neutral Nova capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NovaCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/NovaFacadeError'

  /v1/nova/runs/{runId}:
    get:
      summary: Get a Nova run audit summary through Core
      operationId: getNovaRun
      tags: [Nova]
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Provider-neutral Nova run summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NovaRunSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NovaFacadeError'
        '502':
          $ref: '#/components/responses/NovaFacadeError'

  /v1/ai/capture:
    post:
      summary: Convert free-form capture text into task drafts
      operationId: captureTasksWithAi
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiCaptureRequest'
      responses:
        '200':
          description: Structured task drafts with optional clarification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCaptureResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ai/tasks/describe:
    post:
      summary: Generate a task description draft
      operationId: describeTaskWithAi
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDescribeTaskRequest'
      responses:
        '200':
          description: Generated task description
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiDescribeTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ai/tasks/describe/autocomplete:
    post:
      summary: Suggest task-description completions
      operationId: autocompleteTaskDescriptionWithAi
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDescribeTaskAutocompleteRequest'
      responses:
        '200':
          description: Suggested completions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiDescribeTaskAutocompleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ai/tasks/translate:
    post:
      summary: Translate task text
      operationId: translateTaskWithAi
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiTranslateTaskRequest'
      responses:
        '200':
          description: Translated task text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTranslateTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'


  /v1/ai/goals/{goalId}/breakdown:
    post:
      summary: Break a goal into milestones and draft tasks
      operationId: breakdownGoalWithAi
      tags: [AI]
      parameters:
        - name: goalId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiGoalBreakdownRequest'
      responses:
        '200':
          description: Draft goal breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiGoalBreakdownResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/review/weekly/generate:
    post:
      summary: Generate a weekly review narrative
      operationId: generateWeeklyReviewWithAi
      tags: [AI]
      requestBody:
        required: true
        description: Empty JSON object; review is generated for the authenticated principal.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiWeeklyReviewRequest'
      responses:
        '200':
          description: Weekly review narrative and recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiWeeklyReviewResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/projects/{projectId}/ai-brief:
    post:
      summary: Generate a project AI brief
      operationId: generateProjectBriefWithAi
      tags: [Projects, AI]
      parameters:
        - name: projectId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Project brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiProjectBriefResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Project not found

  /v1/scheduler/ai/duration-estimate:
    post:
      summary: Estimate task duration for scheduler planning
      operationId: estimateSchedulerDurationWithAi
      tags: [Scheduler, AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDurationEstimateRequest'
      responses:
        '200':
          description: Duration estimate with rationale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiDurationEstimateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/scheduler/ai/rationale-phrase:
    post:
      summary: Generate a short rationale for a scheduled block
      operationId: generateSchedulerRationaleWithAi
      tags: [Scheduler, AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiRationalePhraseRequest'
      responses:
        '200':
          description: Rationale phrase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiRationalePhraseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/signup/email:
    post:
      summary: Create a pending email user and dispatch an OTP
      operationId: signupEmail
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupEmailRequest'
      responses:
        '202':
          description: Pending user created
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/verify:
    post:
      summary: Verify signup OTP and activate the user
      operationId: verifyAuthChallenge
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: User activated and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/login:
    post:
      summary: Authenticate an active user
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oauth/google:
    post:
      summary: Authenticate with Google OAuth
      operationId: authenticateWithGoogle
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Tokens issued

  /v1/auth/password/{flow}:
    post:
      summary: Run a public password recovery flow
      description: Public password flows include password reset requests and reset completion.
      operationId: runPasswordFlow
      tags: [Auth]
      security: []
      parameters:
        - name: flow
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Password flow accepted

  /v1/auth/token/refresh:
    post:
      summary: Rotate a refresh-token session
      operationId: refreshToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Session rotated with new tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      summary: Log out and invalidate a refresh-token session
      operationId: logout
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session invalidated

  /v1/auth/me:
    get:
      summary: Get the authenticated user
      operationId: getCurrentUser
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/tasks:
    post:
      summary: Create a task
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: User is not a member of the project
    get:
      summary: List tasks
      operationId: listTasks
      tags: [Tasks]
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: overdueOnly
          schema:
            type: boolean
            default: false
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/tasks/{id}:
    patch:
      summary: Update mutable task fields
      operationId: updateTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: User is not a member of the project
        '404':
          description: Task not found

  /v1/tasks/{id}/status:
    patch:
      summary: Update only task status
      operationId: updateTaskStatus
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: Task status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Task not found

  /v1/tasks/{id}/completion:
    get:
      summary: Get completion state for a task
      operationId: getTaskCompletion
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Completion details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCompletionResponse'
        '404':
          description: Task not found

  /v1/tasks/{id}/archive:
    patch:
      summary: Archive task (soft lifecycle transition)
      operationId: archiveTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

  /v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Project key already exists
    get:
      summary: List projects
      operationId: listProjects
      tags: [Projects]
      parameters:
        - in: query
          name: includeArchived
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /v1/projects/{id}:
    get:
      summary: Get project by id
      operationId: getProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
    patch:
      summary: Update mutable project fields
      operationId: updateProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Project not found
        '409':
          description: Project key already exists


  /v1/projects/{projectId}/members:
    post:
      summary: Add project member
      operationId: addProjectMember
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMembership'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Membership already exists
    get:
      summary: List project members
      operationId: listProjectMembers
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
      responses:
        '200':
          description: Project memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMembership'

  /v1/projects/{projectId}/members/{userId}:
    delete:
      summary: Remove project member
      operationId: removeProjectMember
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: Member removed

  /v1/projects/{id}/archive:
    patch:
      summary: Archive project
      operationId: archiveProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Project archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found

  /v1/tasks/{id}/children:
    get:
      summary: List direct child tasks
      tags: [Tasks]
      responses:
        '200': {description: Child tasks}
  /v1/tasks/{id}/ancestors:
    get:
      summary: List task ancestors
      tags: [Tasks]
      responses:
        '200': {description: Ancestor tasks}
  /v1/tasks/{id}/links:
    get:
      summary: List cross-task links
      tags: [Tasks]
      responses:
        '200': {description: Task links}
    post:
      summary: Create a cross-task link
      tags: [Tasks]
      responses:
        '201': {description: Task link created}
  /v1/task-links/{id}:
    delete:
      summary: Delete a cross-task link
      tags: [Tasks]
      responses:
        '204': {description: Task link deleted}
  /v1/projects/{projectId}/releases:
    get:
      summary: Summarize project releases
      tags: [Projects]
      responses:
        '200': {description: Release summary}


  /v1/scheduler/preferences:
    get:
      summary: Get scheduling preferences for the current user
      operationId: getSchedulingPreferences
      tags: [Scheduler]
      responses:
        '200':
          description: Scheduling preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulingPreferences'
              examples:
                defaultWorkday:
                  $ref: '#/components/examples/SchedulingPreferencesExample'
    put:
      summary: Update scheduling preferences for the current user
      operationId: updateSchedulingPreferences
      tags: [Scheduler]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchedulingPreferencesRequest'
            examples:
              focusedMornings:
                $ref: '#/components/examples/UpdateSchedulingPreferencesRequestExample'
      responses:
        '200':
          description: Updated scheduling preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulingPreferences'
              examples:
                updatedWorkday:
                  $ref: '#/components/examples/SchedulingPreferencesExample'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Stale scheduling preferences version

  /v1/scheduler/generate:
    post:
      summary: Generate scheduled blocks for current user's tasks
      description: Persists new scheduled blocks from TODO and IN_PROGRESS tasks, respects scheduling preferences and existing scheduled blocks, and returns reschedule proposals for missed work.
      operationId: generateSchedule
      tags: [Scheduler]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateScheduleRequest'
            examples:
              nextWorkdayWindow:
                $ref: '#/components/examples/GenerateScheduleRequestExample'
      responses:
        '200':
          description: Generated schedule and reschedule proposals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateScheduleResponse'
              examples:
                generatedBlocksWithProposal:
                  $ref: '#/components/examples/GenerateScheduleResponseExample'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/scheduler/blocks:
    get:
      summary: List scheduled blocks for the current user
      description: Returns persisted scheduler-owned calendar blocks; overdue scheduled blocks are surfaced with MISSED status.
      operationId: listScheduledBlocks
      tags: [Scheduler]
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Scheduled blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduledBlock'
              examples:
                scheduledBlocks:
                  $ref: '#/components/examples/ScheduledBlocksExample'

  /v1/scheduler/blocks/{id}:
    patch:
      summary: Update a scheduled block
      description: Reschedules an existing persisted scheduler block with optimistic-lock protection.
      operationId: updateScheduledBlock
      tags: [Scheduler]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduledBlockRequest'
            examples:
              moveFocusBlock:
                $ref: '#/components/examples/UpdateScheduledBlockRequestExample'
      responses:
        '200':
          description: Updated scheduled block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledBlock'
              examples:
                movedFocusBlock:
                  $ref: '#/components/examples/ScheduledBlockExample'
        '403':
          description: Scheduled block belongs to another user
        '404':
          description: Scheduled block not found
        '409':
          description: Stale scheduled block version

  /v1/scheduler/blocks/{id}/complete:
    post:
      summary: Complete a scheduled block
      operationId: completeScheduledBlock
      tags: [Scheduler]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Completed scheduled block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledBlock'
              examples:
                completedFocusBlock:
                  $ref: '#/components/examples/CompletedScheduledBlockExample'
        '403':
          description: Scheduled block belongs to another user
        '404':
          description: Scheduled block not found

  /v1/activity/search:
    get:
      summary: Search authenticated user activity events
      operationId: searchActivity
      tags: [Activity]
      parameters:
        - in: query
          name: q
          schema: {type: string}
        - in: query
          name: size
          schema: {type: integer, minimum: 1, maximum: 100, default: 20}
      responses:
        '200':
          description: Matching activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivitySearchDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Activity search is disabled or not configured

  /v1/tasks/{taskId}/attachments:
    post:
      summary: Upload a task attachment
      operationId: uploadTaskAttachment
      tags: [Attachments]
      parameters:
        - $ref: '#/components/parameters/TaskIdPathAsTaskId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, mediaKind]
              properties:
                file:
                  type: string
                  format: binary
                mediaKind:
                  $ref: '#/components/schemas/MediaKind'
      responses:
        '201':
          description: Attachment metadata created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAttachment'
        '403':
          description: Task not found or access denied
    get:
      summary: List task attachments
      operationId: listTaskAttachments
      tags: [Attachments]
      parameters:
        - $ref: '#/components/parameters/TaskIdPathAsTaskId'
      responses:
        '200':
          description: Active task attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskAttachment'
        '403':
          description: Task not found or access denied

  /v1/tasks/{taskId}/attachments/{attachmentId}/download:
    get:
      summary: Download a task attachment through Core
      operationId: downloadTaskAttachment
      tags: [Attachments]
      parameters:
        - $ref: '#/components/parameters/TaskIdPathAsTaskId'
        - $ref: '#/components/parameters/AttachmentIdPath'
      responses:
        '200':
          description: Attachment bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Attachment not found

  /v1/tasks/{taskId}/attachments/{attachmentId}:
    delete:
      summary: Delete a task attachment
      operationId: deleteTaskAttachment
      tags: [Attachments]
      parameters:
        - $ref: '#/components/parameters/TaskIdPathAsTaskId'
        - $ref: '#/components/parameters/AttachmentIdPath'
      responses:
        '204':
          description: Attachment deleted
        '404':
          description: Attachment not found

