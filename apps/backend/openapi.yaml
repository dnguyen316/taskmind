        candidateTree: {type: string, nullable: true}

    SpecBreakdownAttachment:
      type: object
      required: [id, draftId, fileName, contentType, sizeBytes, createdByUserId, createdAt]
      properties:
        id: {type: string, format: uuid}
        draftId: {type: string, format: uuid}
