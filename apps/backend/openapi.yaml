    put:
      summary: Update current-user notification preferences
      operationId: updateNotificationPreferences
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateNotificationPreferencesRequest'}
      responses:
        '200': {description: Updated preferences, content: {application/json: {schema: {$ref: '#/components/schemas/NotificationPreference'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
