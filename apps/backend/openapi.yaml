            status: {type: string, enum: [DRAFT, PROCESSING, READY_FOR_REVIEW, MATERIALIZED, REJECTED, FAILED]}
            version: {type: integer, format: int64, nullable: true}
            materializedAt: {type: string, format: date-time, nullable: true}
