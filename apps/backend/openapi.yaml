            text/event-stream:
              schema: {type: string}
        '401': {$ref: '#/components/responses/Unauthorized'}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TaskIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    TaskIdPathAsTaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
        format: uuid
    AttachmentIdPath:
      in: path
      name: attachmentId
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdPathAsProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    UserIdPath:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication is required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ValidationError:
      description: Input validation failure
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true

    NovaFacadeError:
      description: Stable Core AI facade error that does not expose provider internals
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  examples:
    SchedulingPreferencesExample:
      summary: Focus-friendly scheduling preferences
      value:
        id: 11111111-1111-4111-8111-111111111111
        version: 3
        userId: 22222222-2222-4222-8222-222222222222
        workdayStart: '09:00:00'
        workdayEnd: '17:30:00'
        blockGranularityMinutes: 30
        maxDailyFocusMinutes: 360
        createdAt: '2026-06-01T12:00:00Z'
        updatedAt: '2026-06-06T09:15:00Z'
    UpdateSchedulingPreferencesRequestExample:
      summary: Move to shorter focus blocks with optimistic lock
      value:
        version: 3
        workdayStart: '09:00:00'
        workdayEnd: '17:30:00'
        blockGranularityMinutes: 30
        maxDailyFocusMinutes: 360
    ScheduledBlockExample:
      summary: Rescheduled focus block
      value:
        id: 33333333-3333-4333-8333-333333333333
        version: 5
        userId: 22222222-2222-4222-8222-222222222222
        taskId: 44444444-4444-4444-8444-444444444444
        startsAt: '2026-06-08T14:00:00Z'
        endsAt: '2026-06-08T15:30:00Z'
        status: SCHEDULED
        rationale: Moved after calendar conflict; preserves a high-priority implementation window.
        completedAt: null
        createdAt: '2026-06-06T09:30:00Z'
        updatedAt: '2026-06-06T10:05:00Z'
    CompletedScheduledBlockExample:
      summary: Completed focus block
      value:
        id: 33333333-3333-4333-8333-333333333333
        version: 6
        userId: 22222222-2222-4222-8222-222222222222
        taskId: 44444444-4444-4444-8444-444444444444
        startsAt: '2026-06-08T14:00:00Z'
        endsAt: '2026-06-08T15:30:00Z'
        status: COMPLETED
        rationale: Moved after calendar conflict; preserves a high-priority implementation window.
        completedAt: '2026-06-08T15:28:00Z'
        createdAt: '2026-06-06T09:30:00Z'
        updatedAt: '2026-06-08T15:28:00Z'
    ScheduledBlocksExample:
      summary: Scheduled and missed calendar blocks
      value:
        - id: 33333333-3333-4333-8333-333333333333
          version: 5
          userId: 22222222-2222-4222-8222-222222222222
          taskId: 44444444-4444-4444-8444-444444444444
          startsAt: '2026-06-08T14:00:00Z'
