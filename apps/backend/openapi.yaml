openapi: 3.0.3
info:
  title: TaskMind Backend API
  version: 0.1.0
  description: |
    Initial v1 contract draft for TaskMind backend task and project management endpoints.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: Check Core API health
      operationId: getHealth
      tags: [Health]
      security: []
      responses:
        '200':
          description: Core API is healthy

  /v1/auth/signup/email:
    post:
      summary: Create a pending email user and dispatch an OTP
      operationId: signupEmail
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupEmailRequest'
      responses:
        '202':
          description: Pending user created
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/verify:
    post:
      summary: Verify signup OTP and activate the user
      operationId: verifyAuthChallenge
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: User activated and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/login:
    post:
      summary: Authenticate an active user
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oauth/google:
    post:
      summary: Authenticate with Google OAuth
      operationId: authenticateWithGoogle
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Tokens issued

  /v1/auth/password/{flow}:
    post:
      summary: Run a public password recovery flow
      description: Public password flows include password reset requests and reset completion.
      operationId: runPasswordFlow
      tags: [Auth]
      security: []
      parameters:
        - name: flow
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Password flow accepted

  /v1/auth/token/refresh:
    post:
      summary: Rotate a refresh-token session
      operationId: refreshToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Session rotated with new tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      summary: Log out and invalidate a refresh-token session
      operationId: logout
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Session invalidated

  /v1/auth/me:
    get:
      summary: Get the authenticated user
      operationId: getCurrentUser
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/tasks:
    post:
      summary: Create a task
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: User is not a member of the project
    get:
      summary: List tasks
      operationId: listTasks
      tags: [Tasks]
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: overdueOnly
          schema:
            type: boolean
            default: false
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/tasks/{id}:
    patch:
      summary: Update mutable task fields
      operationId: updateTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: User is not a member of the project
        '404':
          description: Task not found

  /v1/tasks/{id}/status:
    patch:
      summary: Update only task status
      operationId: updateTaskStatus
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: Task status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Task not found

  /v1/tasks/{id}/completion:
    get:
      summary: Get completion state for a task
      operationId: getTaskCompletion
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Completion details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCompletionResponse'
        '404':
          description: Task not found

  /v1/tasks/{id}/archive:
    patch:
      summary: Archive task (soft lifecycle transition)
      operationId: archiveTask
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

  /v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Project key already exists
    get:
      summary: List projects
      operationId: listProjects
      tags: [Projects]
      parameters:
        - in: query
          name: includeArchived
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /v1/projects/{id}:
    get:
      summary: Get project by id
      operationId: getProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found
    patch:
      summary: Update mutable project fields
      operationId: updateProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Project not found
        '409':
          description: Project key already exists


  /v1/projects/{projectId}/members:
    post:
      summary: Add project member
      operationId: addProjectMember
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMembership'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Membership already exists
    get:
      summary: List project members
      operationId: listProjectMembers
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
      responses:
        '200':
          description: Project memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMembership'

  /v1/projects/{projectId}/members/{userId}:
    delete:
      summary: Remove project member
      operationId: removeProjectMember
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPathAsProjectId'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: Member removed

  /v1/projects/{id}/archive:
    patch:
      summary: Archive project
      operationId: archiveProject
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Project archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found

  /v1/tasks/{id}/children:
    get:
      summary: List direct child tasks
      tags: [Tasks]
      responses:
        '200': {description: Child tasks}
  /v1/tasks/{id}/ancestors:
    get:
      summary: List task ancestors
      tags: [Tasks]
      responses:
        '200': {description: Ancestor tasks}
  /v1/tasks/{id}/links:
    get:
      summary: List cross-task links
      tags: [Tasks]
      responses:
        '200': {description: Task links}
    post:
      summary: Create a cross-task link
      tags: [Tasks]
      responses:
        '201': {description: Task link created}
  /v1/task-links/{id}:
    delete:
      summary: Delete a cross-task link
      tags: [Tasks]
      responses:
        '204': {description: Task link deleted}
  /v1/projects/{projectId}/releases:
    get:
      summary: Summarize project releases
      tags: [Projects]
      responses:
        '200': {description: Release summary}


  /v1/scheduler/preferences:
    get:
      summary: Get scheduling preferences for the current user
      operationId: getSchedulingPreferences
      tags: [Scheduler]
      responses:
        '200':
          description: Scheduling preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulingPreferences'
              examples:
                defaultWorkday:
                  $ref: '#/components/examples/SchedulingPreferencesExample'
    put:
      summary: Update scheduling preferences for the current user
      operationId: updateSchedulingPreferences
      tags: [Scheduler]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSchedulingPreferencesRequest'
            examples:
              focusedMornings:
                $ref: '#/components/examples/UpdateSchedulingPreferencesRequestExample'
      responses:
        '200':
          description: Updated scheduling preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchedulingPreferences'
              examples:
                updatedWorkday:
                  $ref: '#/components/examples/SchedulingPreferencesExample'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Stale scheduling preferences version

  /v1/scheduler/generate:
    post:
      summary: Generate scheduled blocks for current user's tasks
      description: Persists new scheduled blocks from TODO and IN_PROGRESS tasks, respects scheduling preferences and existing scheduled blocks, and returns reschedule proposals for missed work.
      operationId: generateSchedule
      tags: [Scheduler]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateScheduleRequest'
            examples:
              nextWorkdayWindow:
                $ref: '#/components/examples/GenerateScheduleRequestExample'
      responses:
        '200':
          description: Generated schedule and reschedule proposals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateScheduleResponse'
              examples:
                generatedBlocksWithProposal:
                  $ref: '#/components/examples/GenerateScheduleResponseExample'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/scheduler/blocks:
    get:
      summary: List scheduled blocks for the current user
      description: Returns persisted scheduler-owned calendar blocks; overdue scheduled blocks are surfaced with MISSED status.
      operationId: listScheduledBlocks
      tags: [Scheduler]
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Scheduled blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduledBlock'
              examples:
                scheduledBlocks:
                  $ref: '#/components/examples/ScheduledBlocksExample'

  /v1/scheduler/blocks/{id}:
    patch:
      summary: Update a scheduled block
      description: Reschedules an existing persisted scheduler block with optimistic-lock protection.
      operationId: updateScheduledBlock
      tags: [Scheduler]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduledBlockRequest'
            examples:
              moveFocusBlock:
                $ref: '#/components/examples/UpdateScheduledBlockRequestExample'
      responses:
        '200':
          description: Updated scheduled block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledBlock'
              examples:
                movedFocusBlock:
                  $ref: '#/components/examples/ScheduledBlockExample'
        '403':
          description: Scheduled block belongs to another user
        '404':
          description: Scheduled block not found
        '409':
          description: Stale scheduled block version

  /v1/scheduler/blocks/{id}/complete:
    post:
      summary: Complete a scheduled block
      operationId: completeScheduledBlock
      tags: [Scheduler]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Completed scheduled block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledBlock'
              examples:
                completedFocusBlock:
                  $ref: '#/components/examples/CompletedScheduledBlockExample'
        '403':
          description: Scheduled block belongs to another user
        '404':
          description: Scheduled block not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TaskIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdPathAsProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    UserIdPath:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication is required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ValidationError:
      description: Input validation failure
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true

  examples:
    SchedulingPreferencesExample:
      summary: Focus-friendly scheduling preferences
      value:
        id: 11111111-1111-4111-8111-111111111111
        version: 3
        userId: 22222222-2222-4222-8222-222222222222
        workdayStart: '09:00:00'
        workdayEnd: '17:30:00'
        blockGranularityMinutes: 30
        maxDailyFocusMinutes: 360
        createdAt: '2026-06-01T12:00:00Z'
        updatedAt: '2026-06-06T09:15:00Z'
    UpdateSchedulingPreferencesRequestExample:
      summary: Move to shorter focus blocks with optimistic lock
      value:
        version: 3
        workdayStart: '09:00:00'
        workdayEnd: '17:30:00'
        blockGranularityMinutes: 30
        maxDailyFocusMinutes: 360
    ScheduledBlockExample:
      summary: Rescheduled focus block
      value:
        id: 33333333-3333-4333-8333-333333333333
        version: 5
        userId: 22222222-2222-4222-8222-222222222222
        taskId: 44444444-4444-4444-8444-444444444444
        startsAt: '2026-06-08T14:00:00Z'
        endsAt: '2026-06-08T15:30:00Z'
        status: SCHEDULED
        rationale: Moved after calendar conflict; preserves a high-priority implementation window.
        completedAt: null
        createdAt: '2026-06-06T09:30:00Z'
        updatedAt: '2026-06-06T10:05:00Z'
    CompletedScheduledBlockExample:
      summary: Completed focus block
      value:
        id: 33333333-3333-4333-8333-333333333333
        version: 6
        userId: 22222222-2222-4222-8222-222222222222
        taskId: 44444444-4444-4444-8444-444444444444
        startsAt: '2026-06-08T14:00:00Z'
        endsAt: '2026-06-08T15:30:00Z'
        status: COMPLETED
        rationale: Moved after calendar conflict; preserves a high-priority implementation window.
        completedAt: '2026-06-08T15:28:00Z'
        createdAt: '2026-06-06T09:30:00Z'
        updatedAt: '2026-06-08T15:28:00Z'
    ScheduledBlocksExample:
      summary: Scheduled and missed calendar blocks
      value:
        - id: 33333333-3333-4333-8333-333333333333
          version: 5
          userId: 22222222-2222-4222-8222-222222222222
          taskId: 44444444-4444-4444-8444-444444444444
          startsAt: '2026-06-08T14:00:00Z'
          endsAt: '2026-06-08T15:30:00Z'
          status: SCHEDULED
          rationale: Highest-priority available task in the afternoon focus window.
          completedAt: null
          createdAt: '2026-06-06T09:30:00Z'
          updatedAt: '2026-06-06T09:30:00Z'
        - id: 55555555-5555-4555-8555-555555555555
          version: 2
          userId: 22222222-2222-4222-8222-222222222222
          taskId: 66666666-6666-4666-8666-666666666666
          startsAt: '2026-06-05T16:00:00Z'
          endsAt: '2026-06-05T16:30:00Z'
          status: MISSED
          rationale: Original end-of-day review block.
          completedAt: null
          createdAt: '2026-06-05T08:00:00Z'
          updatedAt: '2026-06-06T09:00:00Z'
    UpdateScheduledBlockRequestExample:
      summary: Reschedule a block with optimistic lock
      value:
        version: 5
        startsAt: '2026-06-08T14:00:00Z'
        endsAt: '2026-06-08T15:30:00Z'
        rationale: Moved after calendar conflict; preserves a high-priority implementation window.
    GenerateScheduleRequestExample:
      summary: Generate schedule for a three-day window
      value:
        from: '2026-06-08T09:00:00Z'
        to: '2026-06-10T17:30:00Z'
    RescheduleProposalExample:
      summary: Missed block should be moved
      value:
        blockId: 55555555-5555-4555-8555-555555555555
        taskId: 66666666-6666-4666-8666-666666666666
        reason: Block is overdue and should be moved
    GenerateScheduleResponseExample:
      summary: Generated blocks with a reschedule proposal
      value:
        blocks:
          - id: 33333333-3333-4333-8333-333333333333
            version: 0
            userId: 22222222-2222-4222-8222-222222222222
            taskId: 44444444-4444-4444-8444-444444444444
            startsAt: '2026-06-08T09:00:00Z'
            endsAt: '2026-06-08T10:00:00Z'
            status: SCHEDULED
            rationale: Auto-scheduled into the first available focus block.
            completedAt: null
            createdAt: '2026-06-06T09:30:00Z'
            updatedAt: '2026-06-06T09:30:00Z'
        proposals:
          - blockId: 55555555-5555-4555-8555-555555555555
            taskId: 66666666-6666-4666-8666-666666666666
            reason: Block is overdue and should be moved

  schemas:
    SignupEmailRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: {type: string, format: email}
        password: {type: string, format: password, minLength: 8, maxLength: 128}
        displayName: {type: string, minLength: 2, maxLength: 80}
    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email: {type: string, format: email}
        otp: {type: string}
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string, format: password}
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: {type: string}
    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: {type: string}
    AuthTokens:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresInSeconds]
      properties:
        accessToken: {type: string}
        refreshToken: {type: string}
        tokenType: {type: string, example: Bearer}
        expiresInSeconds: {type: integer, format: int64}
    AuthUser:
      type: object
      required: [userId, email, displayName]
      properties:
        userId: {type: string, format: uuid}
        email: {type: string, format: email}
        displayName: {type: string}
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

    Project:
      type: object
      required:
        - id
        - name
        - key
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        key:
          type: string
          maxLength: 20
        description:
          type: string
          nullable: true
        ownerUserId:
          type: string
          format: uuid
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required:
        - name
        - key
        - ownerUserId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        key:
          type: string
          minLength: 1
          maxLength: 20
        description:
          type: string
          nullable: true
        ownerUserId:
          type: string
          format: uuid

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        key:
          type: string
          maxLength: 20
        description:
