      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201': {description: Attachment uploaded, content: {application/json: {schema: {$ref: '#/components/schemas/SpecBreakdownAttachment'}}}}
        '403': {description: Draft not found or access denied}
    get:
      summary: List active spec breakdown draft attachments
      operationId: listSpecBreakdownAttachments
      tags: [SpecBreakdown]
      parameters:
        - {name: draftId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Active draft attachments, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/SpecBreakdownAttachment'}}}}}
        '403': {description: Draft not found or access denied}
  /v1/spec-breakdown/drafts/{draftId}/attachments/{attachmentId}:
    delete:
      summary: Delete a spec breakdown draft attachment
      operationId: deleteSpecBreakdownAttachment
      tags: [SpecBreakdown]
      parameters:
        - {name: draftId, in: path, required: true, schema: {type: string, format: uuid}}
