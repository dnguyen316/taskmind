# Production Relay profile: every external dependency is supplied by the deployment
# environment/secret manager. Intentionally no local/test fallbacks are provided here.
spring.datasource.url=${TASKMIND_DB_URL}
spring.datasource.username=${TASKMIND_DB_USERNAME}
spring.datasource.password=${TASKMIND_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${TASKMIND_REDIS_HOST}
spring.data.redis.port=${TASKMIND_REDIS_PORT}
spring.data.redis.password=${TASKMIND_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${TASKMIND_REDIS_SSL_ENABLED:true}
taskmind.relay.enabled=true
taskmind.relay.stream-key=${TASKMIND_RELAY_STREAM_KEY}
taskmind.relay.consumer-group=${TASKMIND_RELAY_CONSUMER_GROUP}
taskmind.relay.poll-interval-ms=${TASKMIND_RELAY_POLL_INTERVAL_MS:1000}

spring.elasticsearch.uris=${TASKMIND_OPENSEARCH_ENDPOINT}
taskmind.activity-search.enabled=true
taskmind.activity-search.index=${TASKMIND_ACTIVITY_SEARCH_INDEX}

taskmind.relay.service-token=${TASKMIND_RELAY_SERVICE_TOKEN}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true

logging.level.root=INFO
logging.level.com.taskmind.relay=INFO
logging.level.org.springframework.security=WARN
