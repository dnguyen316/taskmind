spring.application.name=taskmind-relay
server.port=8081
spring.datasource.url=${TASKMIND_DB_URL:jdbc:postgresql://localhost:5432/taskmind}
spring.datasource.username=${TASKMIND_DB_USERNAME:taskmind}
spring.datasource.password=${TASKMIND_DB_PASSWORD:taskmind}
spring.datasource.driver-class-name=org.postgresql.Driver
taskmind.relay.stream-key=${TASKMIND_RELAY_STREAM_KEY:taskmind.events}
taskmind.relay.service-token=${TASKMIND_RELAY_SERVICE_TOKEN:local-relay-service-token}
taskmind.relay.consumer-group=${TASKMIND_RELAY_CONSUMER_GROUP:relay-workers}
taskmind.relay.enabled=${TASKMIND_RELAY_ENABLED:true}
taskmind.activity-search.enabled=${TASKMIND_ACTIVITY_SEARCH_ENABLED:false}
taskmind.activity-search.index=${TASKMIND_ACTIVITY_SEARCH_INDEX:activity-events}
taskmind.activity-search.recommendation-entity-types=${TASKMIND_ACTIVITY_SEARCH_RECOMMENDATION_ENTITY_TYPES:task,project,attachment,document,spec,spec-document}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.99
