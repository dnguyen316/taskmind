name: AWS Infrastructure Plan

on:
  pull_request:
    paths:
      - 'infra/aws/**'
      - '.github/workflows/infra-plan.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub deployment environment to plan.
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: infra-plan-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: 'true'
  TOFU_VERSION: 1.8.8

jobs:
  validate-modules:
    name: Validate AWS modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - network
          - security
          - data
          - compute
          - edge
          - observability
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Initialize module without backend
        working-directory: infra/aws/${{ matrix.module }}
        run: tofu init -backend=false

      - name: Format check
        working-directory: infra/aws/${{ matrix.module }}
        run: tofu fmt -check -diff

      - name: Validate module
        working-directory: infra/aws/${{ matrix.module }}
        run: tofu validate


  validate-environment-roots:
    name: Validate composed AWS environment roots
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - staging
          - production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Initialize environment without backend
        working-directory: infra/aws/envs/${{ matrix.environment }}
        run: tofu init -backend=false

      - name: Format check
        working-directory: infra/aws/envs/${{ matrix.environment }}
        run: tofu fmt -check -diff

      - name: Validate environment root
        working-directory: infra/aws/envs/${{ matrix.environment }}
        run: tofu validate

  plan-environment:
    name: Plan composed environment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment }}
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      CLOUDWATCH_LOGS_KMS_KEY_ID: ${{ vars.CLOUDWATCH_LOGS_KMS_KEY_ID }}
      TF_VAR_account_suffix: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_alb_certificate_arn: ${{ vars.ALB_CERTIFICATE_ARN }}
      TF_VAR_cloudfront_certificate_arn: ${{ vars.CLOUDFRONT_CERTIFICATE_ARN }}
      TF_VAR_frontend_aliases: ${{ vars.FRONTEND_ALIASES_JSON || '[]' }}
      TF_VAR_service_images: ${{ vars.SERVICE_IMAGES_JSON }}
      TF_VAR_service_environment: ${{ vars.SERVICE_ENVIRONMENT_JSON || '{}' }}
      TF_VAR_service_secrets: ${{ vars.SERVICE_SECRETS_JSON || '{}' }}
      TF_VAR_core_secret_arns: ${{ vars.CORE_SECRET_ARNS_JSON }}
      TF_VAR_relay_secret_arns: ${{ vars.RELAY_SECRET_ARNS_JSON }}
      TF_VAR_nova_secret_arns: ${{ vars.NOVA_SECRET_ARNS_JSON }}
      TF_VAR_alarm_topic_arns: ${{ vars.ALARM_TOPIC_ARNS_JSON || '[]' }}
      TF_VAR_cloudwatch_logs_kms_key_id: ${{ inputs.environment == 'production' && vars.CLOUDWATCH_LOGS_KMS_KEY_ID || '' }}
      TF_VAR_redis_auth_token: ${{ secrets.TASKMIND_REDIS_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Validate plan configuration
        run: |
          required=(AWS_ACCOUNT_ID AWS_REGION AWS_ROLE_TO_ASSUME TF_VAR_alb_certificate_arn TF_VAR_service_images TF_VAR_core_secret_arns TF_VAR_relay_secret_arns TF_VAR_nova_secret_arns TF_VAR_redis_auth_token)
          if [ "${{ inputs.environment }}" = "production" ]; then
            required+=(TF_VAR_cloudwatch_logs_kms_key_id)
          fi
          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub environment variables: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate AWS account
        run: |
          caller_identity="$(aws sts get-caller-identity)"
          printf '%s\n' "$caller_identity"

          actual_account_id="$(printf '%s' "$caller_identity" | jq -r '.Account')"
          if [ "$actual_account_id" != "$AWS_ACCOUNT_ID" ]; then
            printf 'AWS account mismatch: expected %s but authenticated as %s.\n' "$AWS_ACCOUNT_ID" "$actual_account_id" >&2
            exit 1
          fi

      - name: Verify environment root exists
        run: test -d "infra/aws/envs/${{ inputs.environment }}"

      - name: Initialize environment
        working-directory: infra/aws/envs/${{ inputs.environment }}
        # Environment roots use S3 remote state and DynamoDB locking declared in backend.tf.
        # Override backend values here with -backend-config flags if an account uses different
        # bootstrap bucket or lock table names than the committed defaults.
        run: tofu init

      - name: Plan environment
        working-directory: infra/aws/envs/${{ inputs.environment }}
        run: tofu plan -input=false -out=tfplan
